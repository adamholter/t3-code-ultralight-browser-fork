name: Release assets

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          node --input-type=module -e 'import pkg from "./package.json" with { type: "json" }; const expected = `v${pkg.version}`; if (process.env.RELEASE_TAG !== expected) throw new Error(`Release tag ${process.env.RELEASE_TAG} does not match ${expected}`);'
      - run: npm ci
      - run: npm run check
      - run: npm audit --omit=dev
      - run: npm run package:release
      - name: Verify npm publication payload
        run: |
          tarball="$(node -p "'t3-code-ultralight-browser-fork-' + require('./package.json').version + '.tgz'")"
          npm publish "$PWD/release/$tarball" --dry-run --json > /tmp/npm-publish.json
          node --input-type=module -e 'import { readFile } from "node:fs/promises"; const value = JSON.parse(await readFile("/tmp/npm-publish.json", "utf8")); if (value.name !== "t3-code-ultralight-browser-fork" || value.version !== process.env.RELEASE_TAG.slice(1) || value.entryCount < 40 || value.bundled.length !== 0) throw new Error(`Unexpected npm payload: ${JSON.stringify(value)}`);'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
      - name: Attest release archives
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: release/*.tgz
      - name: Replace release assets with verified archives
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" release/*.tgz --clobber
      - name: Publish npm package when configured
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tarball="$(node -p "'t3-code-ultralight-browser-fork-' + require('./package.json').version + '.tgz'")"
          if ! npm view "t3-code-ultralight-browser-fork@$version" version >/dev/null 2>&1; then
            npm publish "$PWD/release/$tarball" --access public --provenance
          fi
